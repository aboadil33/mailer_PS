<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
</head>

<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:25px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:10px;padding:30px;">

                    <tr>
                        <td align="center">
                            <h2 style="margin:0;color:#222;">
                                Hello {{##Email##}}
                            </h2>
                        </td>
                    </tr>

                    <tr>
                        <td style="height:20px;"></td>
                    </tr>

                    <tr>
                        <td style="font-size:15px;color:#555;line-height:24px;">
                            We wanted to share a quick update with you.
                            Please take a moment to check the information available below.
                        </td>
                    </tr>

                    <tr>
                        <td style="height:25px;"></td>
                    </tr>

                    <tr>
                        <td align="center">
                            <a href="{{##LINK##}}" style="background:#333;color:#fff;padding:12px 26px;
border-radius:5px;text-decoration:none;display:inline-block;">
                                Learn More
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td style="height:30px;"></td>
                    </tr>

                    <tr>
                        <td style="font-size:14px;color:#555;line-height:22px;">
                            Reference:
                            <b>{{##SESSION##}}</b>
                        </td>
                    </tr>

                    <tr>
                        <td style="height:20px;"></td>
                    </tr>

                    <tr>
                        <td align="center" style="color:#888;font-size:12px;">
                            Thank you for your attention.
                        </td>
                    </tr>

                </table>

                <table width="600">
                    <tr>
                        <td align="center" style="padding:20px;color:#888;font-size:12px;">

                            <a href="{{UNSUBSCRIBE_LINK}}" style="color:#888;">
                                Unsubscribe
                            </a>

                            &nbsp;|&nbsp;

                            <a href="{{SUPPORT_LINK}}" style="color:#888;">
                                Support
                            </a>

                            &nbsp;|&nbsp;

                            <a href="{{PRIVACY_LINK}}" style="color:#888;">
                                Privacy
                            </a>

                            <br><br>

                            © 2026 Your Company

                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
