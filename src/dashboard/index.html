<!DOCTYPE html>

<html>

<head>

    <title>Mail Tracker</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <h1>📬 Mail Tracker</h1>


    <div class="stats">

        <div>
            <h3>Queued</h3>
            <span id="queued">0</span>
        </div>


        <div>
            <h3>Delivered</h3>
            <span id="delivered">0</span>
        </div>


        <div>
            <h3>Deferred</h3>
            <span id="deferred">0</span>
        </div>


        <div>
            <h3>Bounce</h3>
            <span id="bounce">0</span>
        </div>

    </div>



    <table>

        <thead>

            <tr>

                <th>Email</th>
                <th>Status</th>
                <th>Date</th>

            </tr>

        </thead>


        <tbody id="mails">

        </tbody>


    </table>



    <script src="app.js"></script>


</body>

</html>
